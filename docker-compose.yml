services:
  db-dev:
    image: postgres:16-alpine
    container_name: db-dev
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend_network

  db-test:
    image: postgres:16-alpine
    container_name: db-test
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_TEST_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_TEST_DB}
    ports:
      - ${POSTGRES_TEST_PORT}:${POSTGRES_PORT}
    # Sem volume: banco descartável, recriado a cada `docker-compose up`.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER} -d ${POSTGRES_TEST_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development      
    container_name: mundoinvest-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-dev:${POSTGRES_PORT}/${POSTGRES_DB}
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_TEST_USER}:${POSTGRES_TEST_PASSWORD}@db-test:${POSTGRES_PORT}/${POSTGRES_TEST_DB}
    volumes:
      - .:/app
    ports:
      - ${APPLICATION_PORT}:${APPLICATION_PORT}
    depends_on:
      db-dev:
        condition: service_healthy
      db-test:
        condition: service_healthy
    networks:
      - backend_network


networks:
  backend_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
